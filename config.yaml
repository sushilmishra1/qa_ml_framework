## qa-ml-framework configuration

data:
  raw_dir: data/raw
  processed_dir: data/processed
  history_days: 90          # how many days of JUnit history to load

features:
  rolling_window_days: 30   # window for failure_rate_30d
  churn_window_days: 7      # git churn lookback

model:
  random_state: 42
  test_split_days: 14       # last N days held out for validation (time-split)
  n_estimators: 200         # Random Forest trees
  class_weight: balanced    # handles class imbalance automatically

ci_gate:
  risk_threshold: 0.35      # mean P(fail) of top-10 tests; above = block PR
  top_n_tests: 200          # run only the top-N highest-risk tests

anomaly:
  contamination: 0.05       # expected fraction of anomalies (Isolation Forest)
  zscore_threshold: 3.0     # Z-score cutoff for simple threshold alerts
  baseline_window: 50       # number of recent samples for rolling baseline

reports:
  output_dir: reports
  html_report: true
  json_report: true
